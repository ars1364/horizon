name: Build & Push Horizon Image

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      kolla_base:
        description: "Kolla base image (e.g. local-registry:5000/kolla/horizon:2025.1)"
        required: false
        default: ""

env:
  IMAGE: ghcr.io/chjkh8113/horizon
  # Default base — override via workflow_dispatch input or update after pushing base to ghcr.io
  DEFAULT_BASE: ghcr.io/chjkh8113/kolla-horizon-base:2025.1

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve base image
        id: base
        run: |
          INPUT="${{ github.event.inputs.kolla_base }}"
          echo "image=${INPUT:-${{ env.DEFAULT_BASE }}}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kolla
          push: true
          tags: |
            ${{ env.IMAGE }}:2025.1
            ${{ env.IMAGE }}:latest
          build-args: |
            KOLLA_BASE=${{ steps.base.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
